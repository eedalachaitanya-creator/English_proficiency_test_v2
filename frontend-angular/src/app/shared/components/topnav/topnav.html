<header class="topnav" [class.hr]="variant === 'hr'">
  <div class="brand">{{ title }}</div>

  <div class="meta">
    <ng-content></ng-content>

    @if (meta) {
      <span>{{ meta }}</span>
    }

    @if (showLogout) {
      <ng-container>
        &nbsp;•&nbsp;
        <a href="#" (click)="onLogoutClick($event)" style="color: var(--white);">Logout</a>
      </ng-container>
    }
  </div>
</header>
