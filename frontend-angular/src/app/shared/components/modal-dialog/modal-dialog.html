<div class="modal-backdrop show" (click)="onBackdropClick($event)">
  <div class="modal" style="max-width: 420px;">

    @if (title) {
      <h2>{{ title }}</h2>
    }

    <p class="modal-message">{{ message }}</p>

    <div class="flex-row">
      @if (!isAlert) {
        <button
          type="button"
          class="btn btn-secondary"
          (click)="onCancel()">
          {{ cancelText }}
        </button>
      }

      <span class="spacer"></span>

      <button
        type="button"
        class="btn"
        [class.btn-primary]="!dangerous"
        [class.btn-danger]="dangerous"
        (click)="onOk()">
        {{ okText }}
      </button>
    </div>

  </div>
</div>
