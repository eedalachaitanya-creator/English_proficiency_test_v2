<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Portal — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topnav">
    <div class="brand">English Proficiency Test  —  HR Portal</div>
    <div class="meta">Internal use only</div>
  </header>

  <main class="page-narrow">
    <div class="card">
      <h1>HR Sign In</h1>
      <p class="subtitle">Log in to invite candidates and view results.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required autofocus>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="field-error" id="loginError"></div>

        <button type="submit" class="btn btn-primary btn-block">SIGN IN  →</button>
      </form>

      <p class="text-muted text-center mt-6" style="font-size: 12px;">
        New HR account? Ask an admin to create one via the CLI script.
      </p>
    </div>
  </main>

  <footer class="footer">© Company HR  •  Privacy  •  Support</footer>

  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
