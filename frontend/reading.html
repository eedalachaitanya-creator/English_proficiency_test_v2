<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Section — English Proficiency Test</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topnav">
    <div class="brand">English Proficiency Test  —  Section 1 of 2: Reading</div>
    <div class="meta" id="candidateMeta"></div>
  </header>

  <div class="section-bar">
    <div>
      Section 1 / 2
      <span class="progress-bar"><span class="fill" style="width: 50%;"></span></span>
    </div>
    <div class="timer" id="timer">⏱  25:00</div>
  </div>

  <main class="page">
    <div class="reading-grid">
      <!-- LEFT: passage -->
      <div class="card">
        <div class="card-header">PASSAGE</div>
        <div class="passage" id="passage"></div>
      </div>

      <!-- RIGHT: questions -->
      <div class="card">
        <div class="card-header">QUESTIONS</div>

        <!-- NEW: per-question progress bar (Duolingo-style clarity) -->
        <div class="q-progress">
          <div class="q-progress-track">
            <div class="q-progress-fill" id="qProgressFill" style="width: 0%;"></div>
          </div>
          <div class="q-progress-label" id="qProgressLabel">0 / 0</div>
        </div>

        <form id="questionsForm"></form>
      </div>
    </div>

    <div class="flex-row mt-6">
      <button id="backBtn" class="btn btn-secondary">←  BACK TO INSTRUCTIONS</button>
      <span class="spacer"></span>
      <span id="answeredCount" class="text-muted" style="font-size: 13px;"></span>
      <button id="nextBtn" class="btn btn-primary">NEXT: SPEAKING  →</button>
    </div>
  </main>

  <footer class="footer">Auto-saves on selection  •  Do not refresh</footer>

  <script src="js/common.js"></script>
  <script src="data/content.js"></script>
  <script src="js/reading.js"></script>
</body>
</html>
